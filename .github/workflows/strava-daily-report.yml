name: Strava Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *" # 4:00 PM Central Standard Time
    - cron: "0 21 * * *" # 4:00 PM Central Daylight Time

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      STRAVA_CLUB_ID: ${{ secrets.STRAVA_CLUB_ID }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
      STRAVA_LOGO_URL: ${{ secrets.STRAVA_LOGO_URL }}
      WORKER_REPORT_URL: ${{ secrets.WORKER_REPORT_URL }}
      REPORT_API_TOKEN: ${{ secrets.REPORT_API_TOKEN }}
      TZ: America/Chicago

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch report data
        run: node fetch.js

      - name: Generate PDF
        run: node generate-pdf.js

      - name: Send email
        run: node send-email.js

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strava-daily-report
          path: |
            report-data.json
            *.pdf
          if-no-files-found: warn
